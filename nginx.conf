server {
    listen 80;
    server_name agent.kael.es;

    # Certbot will verify domain ownership via this path
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Proxy all other requests to Node.js
    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;

        # WebSocket support (for Socket.io)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }
}

# HTTPS block will be added automatically by Certbot after you run:
# certbot --nginx -d agent.kael.es
