server {
    listen 80;
    server_name agent.kael.es;

    # Redirect HTTP → HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name agent.kael.es;

    # SSL — Certbot will fill these in automatically
    # ssl_certificate /etc/letsencrypt/live/agent.kael.es/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/agent.kael.es/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # Proxy all requests to the Node.js app on port 3001
    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;

        # WebSocket support (for Socket.io)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }

    # Serve uploaded/static files efficiently (if any)
    location /static/ {
        alias /var/www/socialai/client/dist/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
